.pdf-mode .fifa-card {

    <script>
                const flags = {
            "México": "🇲🇽", "Sudáfrica": "🇿🇦", "Corea del Sur": "🇰🇷", "República Checa": "🇨🇿",
            "Canadá": "🇨🇦", "Bosnia": "🇧🇦", "Catar": "🇶🇦", "Suiza": "🇨🇭",
            "Brasil": "🇧🇷", "Marruecos": "🇲🇦", "Haití": "🇭🇹", "Escocia": "🏴",
            "EE. UU.": "🇺🇸", "Paraguay": "🇵🇾", "Australia": "🇦🇺", "Turquía": "🇹🇷",
            "Alemania": "🇩🇪", "Curazao": "🇨🇼", "Costa de Marfil": "🇨🇮", "Ecuador": "🇪🇨",
            "Países Bajos": "🇳🇱", "Japón": "🇯🇵", "Suecia": "🇸🇪", "Túnez": "🇹🇳",
            "Bélgica": "🇧🇪", "Egipto": "🇪🇬", "Irán": "🇮🇷", "N. Zelanda": "🇳🇿",
            "España": "🇪🇸", "Cabo Verde": "🇨🇻", "Arabia": "🇸🇦", "Uruguay": "🇺🇾",
            "Francia": "🇫🇷", "Senegal": "🇸🇳", "Irak": "🇮🇶", "Noruega": "🇳🇴",
            "Argentina": "🇦🇷", "Argelia": "🇩🇿", "Austria": "🇦🇹", "Jordania": "🇯🇴",
            "Portugal": "🇵🇹", "RD Congo": "🇨🇩", "Uzbekistán": "🇺🇿", "Colombia": "🇨🇴",
            "Inglaterra": "🏴", "Croacia": "🇭🇷", "Ghana": "🇬🇭", "Panamá": "🇵🇦"
        };

        const GOOGLE_SHEET_ID_FUTBOL = '1fS_1_5Y8gFVdjp2GGO9JSD1lSdomfxwHVdiH2carGKY';
        const GOOGLE_SHEET_ID_ESCOLAR = '1YVNioes4gr5UCcxIDHbYjrsoR7osrwofKkPuuVfklcg';
        const SHEET_NAME_FUTBOL = 'Futbol';
        const SHEET_NAME_ESCOLAR = 'Escolar';
        const SKIP_HEADER_ROW = true;

        let poolEscolar = [
            "¿Cuál es la capital del país y cuántos habitantes tiene aproximadamente?",
            "¿Cuál es el idioma oficial y qué otras lenguas se hablan?",
            "¿Cuál es la moneda oficial y su tipo de cambio respecto al dólar?",
            "¿En qué continente se encuentra y con qué países limita?",
            "¿Cuál es el porcentaje de acceso a internet en la población?",
            "¿Cómo se fomenta la alfabetización digital en las escuelas?",
            "¿Cuál es el plato nacional o comida más representativa?",
            "¿Quién es un personaje histórico o científico relevante del país?",
            "¿Qué medidas toma el país para proteger su biodiversidad?"
        ];

        let poolFutbol = [
            "Máximo goleador histórico del país en los mundiales",
            "Jugador con más partidos disputados en Copas del Mundo",
            "Mejor posición alcanzada por la selección en un Mundial",
            "Año de la primera participación del país en el torneo",
            "Entrenador con más partidos dirigidos en mundiales"
        ];

        document.addEventListener('DOMContentLoaded', () => {
            loadPoolsFromGoogleSheet();
        });

        async function loadPoolsFromGoogleSheet() {
            const requests = [];

            if (GOOGLE_SHEET_ID_FUTBOL) {
                requests.push(
                    fetchGoogleSheet(GOOGLE_SHEET_ID_FUTBOL, SHEET_NAME_FUTBOL)
                        .catch(err => {
                            console.warn('Error futbol:', err);
                            return [];
                        })
                );
            }

            if (GOOGLE_SHEET_ID_ESCOLAR) {
                requests.push(
                    fetchGoogleSheet(GOOGLE_SHEET_ID_ESCOLAR, SHEET_NAME_ESCOLAR)
                        .catch(err => {
                            console.warn('Error escolar:', err);
                            return [];
                        })
                );
            }

            if (!requests.length) {
                return;
            }

            try {
                const results = await Promise.all(requests);
                if (results[0] && Array.isArray(results[0]) && results[0].length) poolFutbol = results[0];
                if (results[1] && Array.isArray(results[1]) && results[1].length) poolEscolar = results[1];
            } catch (error) {
                console.warn('Error general cargando sheets:', error);
            }
        }

        async function fetchGoogleSheet(sheetId, sheetName) {
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status} al cargar hoja ${sheetName}`);
            }
            const text = await response.text();
            const json = parseGvizResponse(text);
            return extractSheetColumn(json);
        }

        function parseGvizResponse(text) {
            const prefix = 'google.visualization.Query.setResponse(';
            const start = text.indexOf(prefix);
            const end = text.lastIndexOf(');');
            const jsonText = start >= 0 && end > start
                ? text.substring(start + prefix.length, end)
                : text;
            return JSON.parse(jsonText);
        }

        function extractSheetColumn(json) {
            if (!json || !json.table || !Array.isArray(json.table.rows)) {
                return [];
            }
            const rows = json.table.rows;
            const values = rows
                .map((row, index) => {
                    const cell = row.c && row.c[0];
                    return cell && cell.v ? cell.v.toString().trim() : '';
                })
                .filter(Boolean);

            return SKIP_HEADER_ROW ? values.slice(1) : values;
        }

        function iniciarSorteo(tipo) {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                const msg = document.getElementById('status-msg');
                msg.style.display = 'block';
                
                let i = 0;
                const interval = setInterval(() => {
                    const keys = Object.keys(flags);
                    msg.innerText = keys[Math.floor(Math.random()*keys.length)].toUpperCase();
                    if(i++ > 15) {
                        clearInterval(interval);
                        msg.style.display = 'none';
                        revelar(tipo);
                    }
                }, 80);
            }, 400);
        }

        function shuffleArray(array) {
            const copy = array.slice();
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function getGroupsFromFlags() {
            const keys = Object.keys(flags);
            const groups = [];
            for (let i = 0; i < keys.length; i += 4) {
                groups.push(keys.slice(i, i + 4));
            }
            return groups;
        }

        function getRandomRealGroup() {
            const groups = getGroupsFromFlags();
            const index = Math.floor(Math.random() * groups.length);
            return groups[index];
        }

        function revelar(tipo) {
            const page = document.getElementById('a4-page');
            const display = document.getElementById('cards-display');
            const keys = Object.keys(flags);
            let seleccion;
            if (tipo === 'grupo') {
                seleccion = getRandomRealGroup();
            } else {
                seleccion = shuffleArray(keys).slice(0, 4); // Selección aleatoria de 4 países
            }

            const cardsHTML = seleccion.map((pais, idx) => {
                const qF = poolFutbol.sort(() => 0.5 - Math.random()).slice(0, 3);
                const qE = poolEscolar.sort(() => 0.5 - Math.random()).slice(0, 3);
                return `
                <div class="fifa-card" style="animation-delay: ${idx * 0.2}s">
                    <div class="card-header">
                        <h2>${pais}</h2>
                    </div>
                    <div class="card-body">
                        <div class="section-header">⚽ INVESTIGACIÓN DEPORTIVA</div>
                        ${qF.map(q => `<div class="question-box"><span class="question-text">${q}:</span><div class="underline"></div></div>`).join('')}
                        <div class="section-header">🌐 CULTURA GENERAL</div>
                        ${qE.map(q => `<div class="question-box"><span class="question-text">${q}:</span><div class="underline"></div></div>`).join('')}
                    </div>
                </div>`;
            }).join('');

            page.innerHTML = cardsHTML;
            display.style.display = 'flex';
            display.innerHTML = cardsHTML;

            setTimeout(() => {
                document.querySelectorAll('.fifa-card').forEach(c => c.classList.add('show-card'));
                document.body.style.justifyContent = 'flex-start';
                document.getElementById('download-area').style.display = 'block';
            }, 100);
        }


        function descargarPDF() {

    const display = document.getElementById('cards-display');

    if (!display || display.children.length === 0) {
        alert('No hay tarjetas para descargar');
        return;
    }

    // activar modo PDF
    display.classList.add("pdf-mode");

    // detener animaciones
    document.querySelectorAll('.fifa-card').forEach(card => {

        card.style.animation = 'none';
        card.style.transition = 'none';

        // forzar estado final
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
    });

    // esperar un frame para asegurar repaint
    requestAnimationFrame(() => {

        setTimeout(() => {

            const opt = {

                margin: 0,

                filename: 'Mundial_Digital_2026.pdf',

                image: {
                    type: 'png',
                    quality: 1
                },

                html2canvas: {
                    scale: 3,
                    useCORS: true,
                    allowTaint: false,
                    foreignObjectRendering: false,
                    backgroundColor: '#ffffff',
                    logging: false
                },

                jsPDF: {
                    unit: 'mm',
                    format: 'legal',
                    orientation: 'landscape'
                }
            };

            html2pdf()
                .set(opt)
                .from(display)
                .save()

                .then(() => {

                    // restaurar
                    display.classList.remove("pdf-mode");

                })

                .catch(err => {

                    console.error('Error generando PDF:', err);

                    display.classList.remove("pdf-mode");

                    alert('Error al generar el PDF');

                });

        }, 300);

    });
}
